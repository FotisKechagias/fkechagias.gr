<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="15" fill="#0D1017"/>

  <!-- F — vertical + 2 horizontals -->
  <line x1="11" y1="13" x2="11" y2="51" stroke="#F8F8FA" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="11" y1="13" x2="27" y2="13" stroke="#F8F8FA" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="11" y1="31" x2="23" y2="31" stroke="#F8F8FA" stroke-width="2.5" stroke-linecap="round"/>

  <!-- K — vertical + 2 diagonals -->
  <line x1="34" y1="13" x2="34" y2="51" stroke="#F8F8FA" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="34" y1="31" x2="50" y2="13" stroke="#F8F8FA" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="34" y1="31" x2="50" y2="51" stroke="#F8F8FA" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Blue accent dot — matches --c-blue -->
  <circle cx="54" cy="51" r="3.5" fill="#4D85EE"/>
</svg>
